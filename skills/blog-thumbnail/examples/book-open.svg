<svg viewBox="0 0 680 425" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Open book — learning, guides, "complete guide" posts
       Composition: book spans ~400px wide, ~260px tall, centered at (340, 215)
       Wide landscape shape with open pages filling horizontal space
       Spine at center, pages fan out left and right */

    .page-left {
      fill: white;
      stroke: #cbd5e1;
      stroke-width: 2;
      transition: stroke 0.4s ease;
    }
    .page-right {
      fill: white;
      stroke: #cbd5e1;
      stroke-width: 2;
      transition: stroke 0.4s ease;
    }
    .spine {
      fill: none;
      stroke: #374151;
      stroke-width: 2.5;
      stroke-linecap: round;
      transition: stroke 0.4s ease;
    }
    .cover-edge {
      fill: none;
      stroke: #cbd5e1;
      stroke-width: 2;
      transition: stroke 0.4s ease;
    }
    .text-line {
      stroke: #e5e7eb;
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke 0.4s ease;
    }
    .text-line-dark {
      stroke: #cbd5e1;
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke 0.4s ease;
    }
    .bookmark {
      fill: #e8590c;
      stroke: none;
      transition: transform 0.5s ease, fill 0.3s ease;
      transform-origin: 420px 100px;
    }
    .page-shadow {
      fill: #f9fafb;
      stroke: #e5e7eb;
      stroke-width: 1;
      transition: stroke 0.3s ease;
    }
    .ground-shadow {
      fill: #e5e7eb;
      opacity: 0.4;
      transition: opacity 0.4s ease;
    }

    /* Page flutter animation for hover */
    @keyframes pageFlutter {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-1.5deg); }
      75% { transform: rotate(1.5deg); }
    }
    .flutter-left {
      transform-origin: 340px 340px;
      transition: stroke 0.4s ease;
    }
    .flutter-right {
      transform-origin: 340px 340px;
      transition: stroke 0.4s ease;
    }

    /* Hover: pages flutter, bookmark slides, lines warm */
    svg:hover .flutter-left {
      animation: pageFlutter 2s ease-in-out infinite;
    }
    svg:hover .flutter-right {
      animation: pageFlutter 2s ease-in-out 0.3s infinite;
    }
    svg:hover .page-left {
      stroke: #f4a67a;
    }
    svg:hover .page-right {
      stroke: #f4a67a;
    }
    svg:hover .spine {
      stroke: #e8590c;
    }
    svg:hover .cover-edge {
      stroke: #f4a67a;
    }
    svg:hover .text-line {
      stroke: #f4a67a;
    }
    svg:hover .text-line-dark {
      stroke: #e8590c;
    }
    svg:hover .bookmark {
      transform: translateY(12px);
      fill: #f4a67a;
    }
    svg:hover .page-shadow {
      stroke: #f4a67a;
    }
    svg:hover .ground-shadow {
      opacity: 0.6;
    }
  </style>

  <!-- Ground shadow -->
  <ellipse class="ground-shadow" cx="340" cy="370" rx="130" ry="8"/>

  <!-- Underlying page edges for thickness (visible behind main pages) -->
  <path class="page-shadow" d="M 145 340 C 145 335, 240 320, 340 340"/>
  <path class="page-shadow" d="M 535 340 C 535 335, 440 320, 340 340"/>

  <!-- Additional page layer for depth -->
  <path class="page-shadow" d="M 150 335 C 150 330, 240 310, 340 335"/>
  <path class="page-shadow" d="M 530 335 C 530 330, 440 310, 340 335"/>

  <!-- Left page — curves slightly for open-book perspective -->
  <g class="flutter-left">
    <path class="page-left"
      d="M 150 330 L 150 110 C 150 105, 240 90, 340 105 L 340 330 C 240 315, 150 325, 150 330 Z"
    />
    <!-- Text lines on left page — short rounded lines suggesting paragraphs -->
    <line class="text-line-dark" x1="185" y1="145" x2="280" y2="140"/>
    <line class="text-line" x1="185" y1="165" x2="305" y2="158"/>
    <line class="text-line" x1="185" y1="185" x2="290" y2="177"/>
    <line class="text-line" x1="185" y1="205" x2="270" y2="198"/>
    <line class="text-line" x1="185" y1="235" x2="305" y2="226"/>
    <line class="text-line" x1="185" y1="255" x2="285" y2="247"/>
    <line class="text-line" x1="185" y1="275" x2="300" y2="266"/>
  </g>

  <!-- Right page -->
  <g class="flutter-right">
    <path class="page-right"
      d="M 530 330 L 530 110 C 530 105, 440 90, 340 105 L 340 330 C 440 315, 530 325, 530 330 Z"
    />
    <!-- Text lines on right page -->
    <line class="text-line-dark" x1="375" y1="140" x2="490" y2="145"/>
    <line class="text-line" x1="375" y1="158" x2="495" y2="165"/>
    <line class="text-line" x1="375" y1="177" x2="480" y2="185"/>
    <line class="text-line" x1="375" y1="198" x2="460" y2="205"/>
    <line class="text-line" x1="375" y1="226" x2="495" y2="235"/>
    <line class="text-line" x1="375" y1="247" x2="475" y2="255"/>
    <line class="text-line" x1="375" y1="266" x2="490" y2="275"/>
  </g>

  <!-- Center spine -->
  <line class="spine" x1="340" y1="100" x2="340" y2="335"/>

  <!-- Bookmark — ribbon sticking out from top of right page -->
  <polygon class="bookmark"
    points="420,90 432,90 432,145 426,135 420,145"
  />

  <!-- Cover edges visible at bottom for thickness -->
  <path class="cover-edge" d="M 148 332 C 148 338, 240 348, 340 338"/>
  <path class="cover-edge" d="M 532 332 C 532 338, 440 348, 340 338"/>
</svg>
